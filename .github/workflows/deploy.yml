name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy backend to Railway (staging)
        uses: bervProject/railway-deploy@v1
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: beacon-api-staging

  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Wait for deployment
        run: sleep 30
      - name: Health check
        run: |
          curl -f https://staging-api.beacon.ai/health || exit 1

  deploy-production:
    runs-on: ubuntu-latest
    needs: smoke-test
    environment:
      name: production
      url: https://app.beacon.ai
    steps:
      - uses: actions/checkout@v4
      - name: Deploy backend to Railway (production)
        uses: bervProject/railway-deploy@v1
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN_PROD }}
          service: beacon-api
